services:
  caddy-sidecar:
    container_name: caddy-sidecar
    build:
      context: .
      dockerfile: Dockerfile.caddy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    environment:
      - HOST_DOMAIN=${HOST_DOMAIN}
      # Tell Caddy to use /tmp for its internal files so it doesn't crash from permission errors
      - XDG_DATA_HOME=/tmp/caddy_data
      - XDG_CONFIG_HOME=/tmp/caddy_config
    ports:
      - "8443:8443"  # Ingress
    networks:
      - ext_net
      - int_net
    depends_on:
      - claude-server
    restart: unless-stopped
    cap_drop:
      - ALL
    read_only: true
    pids_limit: 100
    tmpfs:
      - /tmp:noexec,nosuid,size=64m

  proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    container_name: litellm-proxy
    user: "1000:1000"
    cap_drop:
      - ALL
    read_only: true
    pids_limit: 150
    tmpfs:
      - /tmp:noexec,nosuid,size=256m
    environment:
      # secrets from the env
      - DYNAMIC_AGENT_KEY=${DYNAMIC_AGENT_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - HOST_DOMAIN=${HOST_DOMAIN}
      # litellm env variables
      - HOME=/tmp
      - LITELLM_NON_ROOT=true
      - LITELLM_MASTER_KEY=${DYNAMIC_AGENT_KEY}
      - LITELLM_LOG=ERROR
      # Point to the newly injected global CA bundles inside the container
      - SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
      - REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
      - NO_PROXY=localhost,127.0.0.1,mcp-server,claude-server
      - HTTP_PROXY=""
      - HTTPS_PROXY=""

    volumes:
      - ./proxy/proxy_config.yaml:/tmp/config.yaml:ro
      - ./proxy/proxy_wrapper.py:/app/proxy_wrapper.py:ro
    # Run the mock wrapper instead of the standard LiteLLM start command
    entrypoint: ["python3", "/app/proxy_wrapper.py"]
    networks:
      - int_net  # Internal only — egress routed through caddy-sidecar:8081
    restart: unless-stopped

  claude-server:
    build: 
      context: .
      dockerfile: Dockerfile.claude
    container_name: claude-server
    user: "1000:1000"
    environment:
      - DYNAMIC_AGENT_KEY=${DYNAMIC_AGENT_KEY}      
      - ANTHROPIC_BASE_URL=https://proxy:4000        
      - MCP_API_TOKEN=${MCP_API_TOKEN}
      - CLAUDE_API_TOKEN=${CLAUDE_API_TOKEN}
      - MCP_SERVER_URL=https://mcp-server:8443
      - PLAN_SERVER_URL=https://plan-server:8443
      - TESTER_SERVER_URL=https://tester-server:8443
      - NODE_EXTRA_CA_CERTS=/app/certs/ca.crt        # for Node.js/Claude Code
      - CURL_CA_BUNDLE=/app/certs/ca.crt
      - REQUESTS_CA_BUNDLE=/app/certs/ca.crt
      - SSL_CERT_FILE=/app/certs/ca.crt
      - GIT_DIR=/gitdir                              # git_mcp.py uses this for git operations
      - GIT_WORK_TREE=/workspace                     # worktree is the MCP-visible workspace
      - DOCS_DIR=/docs                               # docs_mcp.py reads from here
    volumes:
      - ./workspace:/workspace:ro                    # Source files (read-only — writes go through MCP)
      - ./workspace/.git:/gitdir                     # Git data — follows workspace symlink
      - ./workspace/docs:/docs:ro                    # Project docs — read-only for agent guidance
    networks:
      - int_net
    depends_on:
      - mcp-server
      - plan-server
      - tester-server
      - proxy
    mem_limit: 4g
    cpus: 2.0
    pids_limit: 200
    cap_drop:
      - ALL
    restart: unless-stopped

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: mcp-server
    user: "1000:1000"
    environment:
      - MCP_API_TOKEN=${MCP_API_TOKEN}
      - SSL_CERT_FILE=/app/certs/ca.crt
    volumes:
      - ./workspace:/workspace
    tmpfs:
      - /workspace/.git:ro,size=0  # Shadow .git — structural hook prevention
    networks:
      - int_net
    restart: unless-stopped

  plan-server:
    build:
      context: .
      dockerfile: Dockerfile.plan
    container_name: plan-server
    user: "1000:1000"
    environment:
      - MCP_API_TOKEN=${MCP_API_TOKEN}
      - SSL_CERT_FILE=/app/certs/ca.crt
      - REQUESTS_CA_BUNDLE=/app/certs/ca.crt
    volumes:
      - ../plans:/plans
    networks:
      - int_net
    restart: unless-stopped



  tester-server:
    build:
      context: .
      dockerfile: Dockerfile.tester
    container_name: tester-server
    user: "1000:1000"
    environment:
      - MCP_API_TOKEN=${MCP_API_TOKEN}
      - SSL_CERT_FILE=/app/certs/ca.crt
    volumes:
      - ./workspace:/workspace:ro
    networks:
      - int_net
    restart: unless-stopped

networks:
  ext_net:
    driver: bridge
  int_net:
    internal: true
